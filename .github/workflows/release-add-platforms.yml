# 기존 GitHub Release 에 Linux/Windows 자산을 사후로 추가할 때 사용하는
# 워크플로. 메인 release.yml 은 태그 push 에 트리거되지만 본 워크플로는
# workflow_dispatch 로만 동작하며, 입력으로 받은 대상 태그(예: v0.1.2)
# 의 소스를 체크아웃해 빌드한 뒤 같은 GitHub Release 에 자산을 append
# 한다.
#
# v0.1.2 처럼 macOS 만 게시된 옛 릴리스에 Linux/Windows 빌드를 사후
# 추가하기 위해 도입했다. v0.2.0 이후의 새 릴리스는 메인 release.yml
# 매트릭스가 처음부터 4-OS 를 모두 빌드하므로 본 워크플로가 필요 없다.
#
# 주의:
# - includeUpdaterJson 은 false. 기존 latest.json (mac 엔트리만 있는
#   상태) 을 덮어쓰면 해당 릴리스에서 자동 업데이트 안내를 받는 mac 사용자
#   매니페스트가 깨지므로 본 잡은 의도적으로 updater 매니페스트를 갱신
#   하지 않는다. Windows/Linux 사용자는 v0.1.2 에선 수동 다운로드만 가능.
# - macOS 코드사이닝·노터리는 본 워크플로 범위 밖. 이미 게시된 mac dmg
#   를 그대로 두고 Linux/Windows 자산만 append 한다.
# - matrix 컨텍스트는 잡 레벨 if 에서 사용할 수 없어 (GitHub Actions
#   제약), Linux/Windows 를 별도 잡으로 분리해 inputs.platforms 로
#   각 잡을 켜고 끈다.

name: Release — 추가 플랫폼 빌드 (workflow_dispatch)

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: '대상 태그 (예: v0.1.2). 이 태그의 소스를 체크아웃해 빌드한다.'
        required: true
      platforms:
        description: '빌드할 플랫폼 (콤마 구분: linux, windows). 둘 중 하나만 또는 둘 다.'
        required: true
        default: 'linux,windows'

jobs:
  linux:
    if: ${{ contains(github.event.inputs.platforms, 'linux') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout target tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_tag }}

      - name: Install Linux build dependencies (GTK · WebKitGTK · AppIndicator)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './apps/ime-app/src-tauri -> target'

      - name: Run tests (per CLAUDE.md — 빌드 전에 테스트)
        run: cargo test --workspace --locked

      - name: Build & append to existing release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/ime-app/src-tauri
          tagName: ${{ github.event.inputs.target_tag }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --target x86_64-unknown-linux-gnu

      - name: Rename release assets — `_*` → `saebyeol_*`
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.target_tag }}"
          VERSION="${TAG#v}"
          ARCH=amd64
          # rpm 은 빈 productName 시 `-${VERSION}-1.x86_64.rpm` 로 게시.
          ASSETS=("_${VERSION}_${ARCH}.deb" "_${VERSION}_${ARCH}.AppImage" "-${VERSION}-1.x86_64.rpm")
          TMP=$(mktemp -d)
          for i in 1 2 3 4 5 6 7 8; do
            current=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true)
            ALL_PRESENT=1
            for OLD in "${ASSETS[@]}"; do
              echo "$current" | grep -q "^${OLD}$" || ALL_PRESENT=0
            done
            [ "$ALL_PRESENT" = "1" ] && break
            sleep 8
          done
          for OLD in "${ASSETS[@]}"; do
            NEW="saebyeol${OLD}"
            if ! gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$OLD" -D "$TMP" --clobber 2>/dev/null; then
              echo "skip rename: $OLD (자산 없음)"
              continue
            fi
            mv "$TMP/$OLD" "$TMP/$NEW"
            gh release upload "$TAG" "$TMP/$NEW" --repo "$GITHUB_REPOSITORY" --clobber
            # `-` 시작 자산명은 gh delete-asset 가 플래그로 오해해서 asset id 를 거쳐 API 로 삭제.
            ASSET_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq ".assets[] | select(.name == \"$OLD\") | .id" || true)
            if [ -n "$ASSET_ID" ]; then
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" || true
            fi
          done

  windows:
    if: ${{ contains(github.event.inputs.platforms, 'windows') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './apps/ime-app/src-tauri -> target'

      - name: Run tests (per CLAUDE.md — 빌드 전에 테스트)
        run: cargo test --workspace --locked

      - name: Build & append to existing release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/ime-app/src-tauri
          tagName: ${{ github.event.inputs.target_tag }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          # NSIS 만. WiX MSI light.exe 가 productName "새별" 같은 비-ASCII
          # 출력 파일명에서 실패하므로 MSI 는 빌드하지 않는다.
          args: --target x86_64-pc-windows-msvc --bundles nsis

      - name: Rename release assets — `_*` → `saebyeol_*`
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.target_tag }}"
          VERSION="${TAG#v}"
          ARCH=x64
          # MSI 는 빌드하지 않으므로 (--bundles nsis) NSIS setup.exe 만.
          ASSETS=("_${VERSION}_${ARCH}-setup.exe")
          TMP=$(mktemp -d)
          for i in 1 2 3 4 5 6 7 8; do
            current=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' || true)
            ALL_PRESENT=1
            for OLD in "${ASSETS[@]}"; do
              echo "$current" | grep -q "^${OLD}$" || ALL_PRESENT=0
            done
            [ "$ALL_PRESENT" = "1" ] && break
            sleep 8
          done
          for OLD in "${ASSETS[@]}"; do
            NEW="saebyeol${OLD}"
            if ! gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$OLD" -D "$TMP" --clobber 2>/dev/null; then
              echo "skip rename: $OLD (자산 없음)"
              continue
            fi
            mv "$TMP/$OLD" "$TMP/$NEW"
            gh release upload "$TAG" "$TMP/$NEW" --repo "$GITHUB_REPOSITORY" --clobber
            # `-` 시작 자산명은 gh delete-asset 가 플래그로 오해해서 asset id 를 거쳐 API 로 삭제.
            ASSET_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq ".assets[] | select(.name == \"$OLD\") | .id" || true)
            if [ -n "$ASSET_ID" ]; then
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" || true
            fi
          done
