# ─────────────────────────────────────────────────────────────────────
#  새별 마크다운 에디터 (sbmd) — 사용자 자동완성 사전 샘플
# ─────────────────────────────────────────────────────────────────────
#
# 이 파일이 앱 config 디렉터리에 있으면 실행 시 자동으로 읽혀서 내장
# 사전에 **병합** 됩니다 (같은 `id` 는 덮어쓰기).
#
#   macOS   : ~/Library/Application Support/dev.leaf.sbmd/
#   Windows : %APPDATA%\dev.leaf.sbmd\
#   Linux   : ~/.config/dev.leaf.sbmd/
#
# `#` 로 시작하는 줄은 주석입니다. 유효한 것은 `[[abbr]]` 블록뿐.
#
# ── 스키마 ──────────────────────────────────────────────────────────
#
#   [[abbr]]
#   trigger    = "..."          # 매칭할 꼬리
#   kind       = "cho_seq"      # 또는 "literal" | "ending"
#   body       = "..."          # 확장 결과 (줄바꿈은 """...""" 또는 \n)
#   trigger_on = "explicit"     # 언제 발화하는가 (기본 explicit = Tab)
#   priority   = 100            # 1~10000, 기본 100 — 큰 값이 먼저
#   id         = "..."          # 식별자, 생략 시 자동 생성
#
# ── kind ───────────────────────────────────────────────────────────
#   "cho_seq" — 초성 자음 연속. 예: "ㄱㅅ" → "감사합니다."
#   "literal" — 단어형. 단어 경계(줄 시작·공백 뒤)에서만 매칭.
#   "ending"  — 어미형. 어떤 글자 뒤에든 붙을 수 있음. 예: "습니다".
#
# ── trigger_on ─────────────────────────────────────────────────────
#   "explicit"        — Tab 으로 수락 (기본값, 오발생 없음)
#   "immediate"       — 꼬리 완성 즉시 확장 (빠름, 오발생 주의)
#   "space"           — Space 누를 때 확장 (cho_seq 에 자연스러움)
#   "enter"           — Enter 누를 때 확장
#   "punctuation"     — . , ! ? 등 구두점 순간
#   "jong_completion" — 음절 완성 시 (예약됨 · 아직 미연결)
#
# ── priority 감각 ──────────────────────────────────────────────────
#   150+ : 이 사람에게 확실히 최다 사용
#   100  : 기본 · 선언형 ("습니다.")
#   70   : 의문형 ("습니까?") · 정중 변형
#   50   : 매우 가끔 쓰는 대체 표현
#
# ─────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════
#  1. 바로 쓰는 인사말 · 맺음말 (활성)
# ══════════════════════════════════════════════════════════════════

[[abbr]]
id         = "greet-hello"
trigger    = "ㅇㄴ"
kind       = "cho_seq"
body       = "안녕하세요!"
trigger_on = "space"

[[abbr]]
id         = "greet-thanks"
trigger    = "ㄱㅅ"
kind       = "cho_seq"
body       = "감사합니다."
trigger_on = "space"
priority   = 120

[[abbr]]
id         = "ending-seumnida"
trigger    = "습니다"
kind       = "ending"
body       = "습니다."

[[abbr]]
id         = "ending-haessoyo"
trigger    = "했어요"
kind       = "ending"
body       = "했어요."


